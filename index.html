<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔧 Генератор Ламп для 3D Печати</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #e0e0e0; overflow-x: hidden; }
#canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
.panel { backdrop-filter: blur(20px); background: rgba(15,15,25,0.85); border: 1px solid rgba(255,255,255,0.08); }
.slider-group label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; background: #1a1a2e; outline: none; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #6c63ff; cursor: pointer; border: 2px solid #fff; }
input[type="range"]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #6c63ff; cursor: pointer; border: 2px solid #fff; }
.btn-primary { background: linear-gradient(135deg, #6c63ff, #4834d4); transition: all 0.3s; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108,99,255,0.4); }
.btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
.btn-secondary:hover { background: rgba(255,255,255,0.1); }
.preset-btn { transition: all 0.3s; cursor: pointer; }
.preset-btn:hover, .preset-btn.active { background: rgba(108,99,255,0.2); border-color: #6c63ff; }
.value-display { font-family: monospace; color: #6c63ff; font-weight: 600; }
.tab-btn { transition: all 0.3s; }
.tab-btn.active { background: #6c63ff; color: white; }
.glow-text { text-shadow: 0 0 20px rgba(108,99,255,0.5); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>

<div class="relative" style="height: 100vh;">
  <div id="canvas-container"></div>
  
  <!-- Header -->
  <div class="absolute top-0 left-0 right-0 z-10 p-4">
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-bold glow-text">🔧 Lamp Generator 3D</h1>
      <div class="flex gap-2">
        <button onclick="randomize()" class="btn-secondary px-4 py-2 rounded-lg text-sm font-medium">🎲 Рандом</button>
        <button onclick="resetParams()" class="btn-secondary px-4 py-2 rounded-lg text-sm font-medium">↺ Сброс</button>
        <button onclick="exportSTL()" class="btn-primary px-6 py-2 rounded-lg text-sm font-bold text-white">⬇ STL</button>
      </div>
    </div>
  </div>

  <!-- Left Panel - Presets -->
  <div class="absolute top-20 left-4 z-10 panel rounded-xl p-4 w-56">
    <h3 class="text-sm font-semibold mb-3 text-gray-400 uppercase tracking-wider">Пресеты</h3>
    <div class="grid grid-cols-1 gap-2">
      <button class="preset-btn active px-3 py-2 rounded-lg text-xs text-left border border-transparent" onclick="applyPreset('classic')">🏛 Классика</button>
      <button class="preset-btn px-3 py-2 rounded-lg text-xs text-left border border-transparent" onclick="applyPreset('spiral')">🌀 Спираль</button>
      <button class="preset-btn px-3 py-2 rounded-lg text-xs text-left border border-transparent" onclick="applyPreset('voronoi')">🧬 Воронный</button>
      <button class="preset-btn px-3 py-2 rounded-lg text-xs text-left border border-transparent" onclick="applyPreset('geometric')">🔷 Геометрия</button>
      <button class="preset-btn px-3 py-2 rounded-lg text-xs text-left border border-transparent" onclick="applyPreset('flower')">🌸 Цветок</button>
      <button class="preset-btn px-3 py-2 rounded-lg text-xs text-left border border-transparent" onclick="applyPreset('modern')">⬜ Модерн</button>
      <button class="preset-btn px-3 py-2 rounded-lg text-xs text-left border border-transparent" onclick="applyPreset('tube')">🔬 Тубус</button>
      <button class="preset-btn px-3 py-2 rounded-lg text-xs text-left border border-transparent" onclick="applyPreset('lantern')">🏮 Фонарь</button>
    </div>
  </div>

  <!-- Right Panel - Controls -->
  <div class="absolute top-20 right-4 z-10 panel rounded-xl p-5 w-72 max-h-[calc(100vh-6rem)] overflow-y-auto">
    <!-- Tabs -->
    <div class="flex gap-1 mb-4 bg-black/30 rounded-lg p-1">
      <button class="tab-btn active flex-1 py-1.5 rounded-md text-xs font-medium" onclick="switchTab('shape', this)">Форма</button>
      <button class="tab-btn flex-1 py-1.5 rounded-md text-xs font-medium" onclick="switchTab('pattern', this)">Узор</button>
      <button class="tab-btn flex-1 py-1.5 rounded-md text-xs font-medium" onclick="switchTab('base', this)">База</button>
    </div>

    <!-- Shape Tab -->
    <div id="tab-shape" class="tab-content space-y-4">
      <div class="slider-group">
        <div class="flex justify-between mb-1">
          <label>Высота корпуса</label>
          <span class="value-display" id="val-height">120</span>
        </div>
        <input type="range" min="40" max="250" value="120" id="lampHeight" oninput="updateParam('height', this.value)">
      </div>
      <div class="slider-group">
        <div class="flex justify-between mb-1">
          <label>Нижний радиус</label>
          <span class="value-display" id="val-bottomR">45</span>
        </div>
        <input type="range" min="15" max="80" value="45" id="bottomRadius" oninput="updateParam('bottomR', this.value)">
      </div>
      <div class="slider-group">
        <div class="flex justify-between mb-1">
          <label>Верхний радиус</label>
          <span class="value-display" id="val-topR">35</span>
        </div>
        <input type="range" min="10" max="80" value="35" id="topRadius" oninput="updateParam('topR', this.value)">
      </div>
      <div class="slider-group">
        <div class="flex justify-between mb-1">
          <label>Сторон</label>
          <span class="value-display" id="val-sides">24</span>
        </div>
        <input type="range" min="3" max="48" value="24" id="sides" oninput="updateParam('sides', this.value)">
      </div>
      <div class="slider-group">
        <div class="flex justify-between mb-1">
          <label>Толщина стенки</label>
          <span class="value-display" id="val-wall">1.5</span>
        </div>
        <input type="range" min="0.8" max="4" step="0.1" value="1.5" id="wallThickness" oninput="updateParam('wall', this.value)">
      </div>
      <div class="slider-group">
        <div class="flex justify-between mb-1">
          <label>Изгиб (curvature)</label>
          <span class="value-display" id="val-curve">0</span>
        </div>
        <input type="range" min="-40" max="40" value="0" id="curvature" oninput="updateParam('curve', this.value)">
      </div>
    </div>

    <!-- Pattern Tab -->
    <div id="tab-pattern" class="tab-content space-y-4 hidden">
      <div class="slider-group">
        <div class="flex justify-between mb-1">
          <label>Тип узора</label>
        </div>
        <select id="patternType" onchange="updateParam('patternType', this.value)" class="w-full bg-black/30 border border-white/10 rounded-lg px-3 py-2 text-sm text-white">
          <option value="solid">Сплошной</option>
          <option value="spiral">Спираль</option>
          <option value="hex">Шестиугольники</option>
          <option value="circles">Круги</option>
          <option value="diamond">Ромбы</option>
          <option value="waves">Волны</option>
          <option value="stars">Звёзды</option>
          <option value="voronoi">Вороной</option>
        </select>
      </div>
      <div class="slider-group">
        <div class="flex justify-between mb-1">
          <label>Размер ячейки</label>
          <span class="value-display" id="val-cell">8</span>
        </div>
        <input type="range" min="3" max="20" value="8" id="cellSize" oninput="updateParam('cellSize', this.value)">
      </div>
      <div class="slider-group">
        <div class="flex justify-between mb-1">
          <label>Глубина прорези</label>
          <span class="value-display" id="val-cutDepth">0.8</span>
        </div>
        <input type="range" min="0.2" max="1.5" step="0.1" value="0.8" id="cutDepth" oninput="updateParam('cutDepth', this.value)">
      </div>
      <div class="slider-group">
        <div class="flex justify-between mb-1">
          <label>Спиральные витки</label>
          <span class="value-display" id="val-spiral">5</span>
        </div>
        <input type="range" min="1" max="20" value="5" id="spiralTurns" oninput="updateParam('spiralTurns', this.value)">
      </div>
      <div class="slider-group">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="innerPattern" onchange="updateParam('innerPattern', this.checked)" class="w-4 h-4 accent-[#6c63ff]">
          <span class="text-xs text-gray-400">Внутренний рельеф</span>
        </label>
      </div>
      <div class="slider-group">
        <div class="flex justify-between mb-1">
          <label>Рёбра жёсткости</label>
          <span class="value-display" id="val-ribs">0</span>
        </div>
        <input type="range" min="0" max="12" value="0" id="ribs" oninput="updateParam('ribs', this.value)">
      </div>
    </div>

    <!-- Base Tab -->
    <div id="tab-base" class="tab-content space-y-4 hidden">
      <div class="slider-group">
        <div class="flex justify-between mb-1">
          <label>Тип базы</label>
        </div>
        <select id="baseType" onchange="updateParam('baseType', this.value)" class="w-full bg-black/30 border border-white/10 rounded-lg px-3 py-2 text-sm text-white">
          <option value="flat">Плоская</option>
          <option value="rounded">Закруглённая</option>
          <option value="flared">Расширенная</option>
          <option value="ring">Кольцо</option>
        </select>
      </div>
      <div class="slider-group">
        <div class="flex justify-between mb-1">
          <label>Радиус базы</label>
          <span class="value-display" id="val-baseR">50</span>
        </div>
        <input type="range" min="20" max="90" value="50" id="baseRadius" oninput="updateParam('baseR', this.value)">
      </div>
      <div class="slider-group">
        <div class="flex justify-between mb-1">
          <label>Высота базы</label>
          <span class="value-display" id="val-baseH">8</span>
        </div>
        <input type="range" min="3" max="20" value="8" id="baseHeight" oninput="updateParam('baseH', this.value)">
      </div>
      <div class="slider-group">
        <div class="flex justify-between mb-1">
          <label>Отверстие для LED</label>
          <span class="value-display" id="val-ledHole">20</span>
        </div>
        <input type="range" min="0" max="40" value="20" id="ledHole" oninput="updateParam('ledHole', this.value)">
      </div>
      <div class="slider-group">
        <div class="flex justify-between mb-1">
          <label>Крышка сверху</label>
          <span class="value-display" id="val-topCap">0</span>
        </div>
        <input type="range" min="0" max="1" step="1" value="0" id="topCap" oninput="updateParam('topCap', this.value)">
      </div>
      <div class="slider-group">
        <div class="flex justify-between mb-1">
          <label>Радиус крышки</label>
          <span class="value-display" id="val-topCapR">30</span>
        </div>
        <input type="range" min="5" max="60" value="30" id="topCapRadius" oninput="updateParam('topCapR', this.value)">
      </div>
    </div>

    <div class="mt-4 pt-4 border-t border-white/10">
      <div class="text-xs text-gray-500 mb-2">Информация:</div>
      <div class="text-xs text-gray-400" id="info-text">Граней: ~0 | Объём: ~0 см³</div>
    </div>
  </div>

  <!-- Bottom info -->
  <div class="absolute bottom-4 left-1/2 -translate-x-1/2 z-10 panel rounded-full px-6 py-2">
    <span class="text-xs text-gray-400">🖱 Вращение • Колёсико масштаб • ПКМ перемещение</span>
  </div>
</div>

<script>
// ==================== THREE.JS SETUP ====================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(100, 120, 150);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0xffffff, 1.0);
mainLight.position.set(80, 150, 80);
mainLight.castShadow = true;
mainLight.shadow.mapSize.set(2048, 2048);
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0x6c63ff, 0.3);
fillLight.position.set(-60, 80, -40);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xff6c6c, 0.2);
rimLight.position.set(0, 50, -100);
scene.add(rimLight);

// Inner glow
const innerGlow = new THREE.PointLight(0xffaa44, 0.8, 200);
innerGlow.position.set(0, 60, 0);
scene.add(innerGlow);

// Ground
const groundGeo = new THREE.PlaneGeometry(500, 500);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.9, metalness: 0.1 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid
const gridHelper = new THREE.GridHelper(200, 20, 0x222244, 0x111133);
scene.add(gridHelper);

// ==================== ORBIT CONTROLS (manual) ====================
let isDragging = false;
let isPanning = false;
let prevMouse = { x: 0, y: 0 };
let orbitAngles = { theta: Math.PI / 4, phi: Math.PI / 3 };
let orbitDist = 180;
let orbitTarget = new THREE.Vector3(0, 50, 0);

renderer.domElement.addEventListener('mousedown', (e) => {
  if (e.button === 2) { isPanning = true; } else { isDragging = true; }
  prevMouse = { x: e.clientX, y: e.clientY };
  e.preventDefault();
});

renderer.domElement.addEventListener('mousemove', (e) => {
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  if (isDragging) {
    orbitAngles.theta -= dx * 0.005;
    orbitAngles.phi = Math.max(0.1, Math.min(Math.PI - 0.1, orbitAngles.phi - dy * 0.005));
  }
  if (isPanning) {
    const right = new THREE.Vector3();
    const up = new THREE.Vector3();
    camera.getWorldDirection(new THREE.Vector3());
    right.crossVectors(camera.up, new THREE.Vector3().subVectors(camera.position, orbitTarget)).normalize();
    up.copy(camera.up);
    orbitTarget.add(right.multiplyScalar(-dx * 0.3));
    orbitTarget.add(up.multiplyScalar(dy * 0.3));
  }
  prevMouse = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('mouseup', () => { isDragging = false; isPanning = false; });
renderer.domElement.addEventListener('wheel', (e) => {
  orbitDist = Math.max(50, Math.min(400, orbitDist + e.deltaY * 0.3));
  e.preventDefault();
}, { passive: false });
renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

function updateCamera() {
  camera.position.x = orbitTarget.x + orbitDist * Math.sin(orbitAngles.phi) * Math.cos(orbitAngles.theta);
  camera.position.y = orbitTarget.y + orbitDist * Math.cos(orbitAngles.phi);
  camera.position.z = orbitTarget.z + orbitDist * Math.sin(orbitAngles.phi) * Math.sin(orbitAngles.theta);
  camera.lookAt(orbitTarget);
}

// ==================== LAMP PARAMETERS ====================
const params = {
  height: 120,
  bottomR: 45,
  topR: 35,
  sides: 24,
  wall: 1.5,
  curve: 0,
  patternType: 'solid',
  cellSize: 8,
  cutDepth: 0.8,
  spiralTurns: 5,
  innerPattern: false,
  ribs: 0,
  baseType: 'flat',
  baseR: 50,
  baseH: 8,
  ledHole: 20,
  topCap: 0,
  topCapR: 30
};

let lampMesh = null;
let lampMaterial = new THREE.MeshStandardMaterial({
  color: 0xe8e8f0,
  roughness: 0.3,
  metalness: 0.1,
  side: THREE.DoubleSide
});

// ==================== MESH GENERATION ====================
function generateLampMesh() {
  const geometry = new THREE.BufferGeometry();
  const vertices = [];
  const normals = [];
  const indices = [];

  function addTriangle(v1, v2, v3) {
    vertices.push(...v1, ...v2, ...v3);
    const ax = v2[0]-v1[0], ay = v2[1]-v1[1], az = v2[2]-v1[2];
    const bx = v3[0]-v1[0], by = v3[1]-v1[1], bz = v3[2]-v1[2];
    let nx = ay*bz - az*by, ny = az*bx - ax*bz, nz = ax*by - ay*bx;
    const len = Math.sqrt(nx*nx + ny*ny + nz*nz) || 1;
    nx /= len; ny /= len; nz /= len;
    normals.push(nx,ny,nz, nx,ny,nz, nx,ny,nz);
    const i = vertices.length / 3 - 3;
    indices.push(i, i+1, i+2);
  }

  function getRadius(y) {
    const t = y / params.height;
    let r = params.bottomR + (params.topR - params.bottomR) * t;
    // Apply curve (bulge)
    const curve = params.curve / 1000;
    r += Math.sin(t * Math.PI) * curve * params.height;
    return r;
  }

  function getPatternOffset(y, angle) {
    const t = y / params.height;
    const cell = params.cellSize;
    const pattern = params.patternType;
    const depth = params.cutDepth;
    
    if (pattern === 'solid') return 0;
    if (pattern === 'spiral') {
      const spiralShift = (angle / (Math.PI*2) + t) * params.spiralTurns;
      return Math.sin(spiralShift * Math.PI * 2) > 0 ? -depth : 0;
    }
    if (pattern === 'hex') {
      const ax = Math.round(angle / (Math.PI/3));
      const ay = Math.round(t * params.height / (cell * 0.866));
      return ((ax + ay) % 3 === 0) ? -depth : 0;
    }
    if (pattern === 'circles') {
      const cx = Math.round(angle * params.bottomR / cell);
      const cy = Math.round(t * params.height / cell);
      const localX = angle * params.bottomR - cx * cell;
      const localY = t * params.height - cy * cell;
      return (localX*localX + localY*localY < cell*cell*0.25) ? -depth : 0;
    }
    if (pattern === 'diamond') {
      const ax = Math.round(angle / (Math.PI/4));
      const ay = Math.round(t * params.height / cell);
      return ((ax + ay) % 2 === 0) ? -depth : 0;
    }
    if (pattern === 'waves') {
      return Math.sin(angle * 8 + t * params.spiralTurns) > 0.3 ? -depth : 0;
    }
    if (pattern === 'stars') {
      const ax = Math.round(angle / (Math.PI/5));
      const ay = Math.round(t * params.height / (cell * 1.2));
      return ((ax + ay) % 3 === 0) ? -depth * 1.5 : 0;
    }
    if (pattern === 'voronoi') {
      const seed1 = Math.sin(angle * 3.7 + t * 7.1) * 0.5 + 0.5;
      const seed2 = Math.cos(angle * 5.3 + t * 3.3) * 0.5 + 0.5;
      return (seed1 + seed2 > 1.2) ? -depth : 0;
    }
    return 0;
  }

  const layers = Math.ceil(params.height / params.cellSize) + 1;
  const segs = params.sides;

  // Build main body
  for (let layer = 0; layer < layers; layer++) {
    const y0 = (layer / (layers-1)) * params.height;
    const y1 = ((layer+1) / (layers-1)) * params.height;
    const r0 = getRadius(y0);
    const r1 = getRadius(y1);
    const innerR0 = Math.max(r0 - params.wall, 1);
    const innerR1 = Math.max(r1 - params.wall, 1);

    for (let s = 0; s < segs; s++) {
      const a0 = (s / segs) * Math.PI * 2;
      const a1 = ((s+1) / segs) * Math.PI * 2;
      
      const po00 = getPatternOffset(y0, a0);
      const po01 = getPatternOffset(y0, a1);
      const po10 = getPatternOffset(y1, a0);
      const po11 = getPatternOffset(y1, a1);

      // Outer vertices
      const ox00 = [Math.cos(a0)*(r0+po00), y0, Math.sin(a0)*(r0+po00)];
      const ox01 = [Math.cos(a1)*(r0+po01), y0, Math.sin(a1)*(r0+po01)];
      const ox10 = [Math.cos(a0)*(r1+po10), y1, Math.sin(a0)*(r1+po10)];
      const ox11 = [Math.cos(a1)*(r1+po11), y1, Math.sin(a1)*(r1+po11)];

      // Inner vertices
      const ix00 = [Math.cos(a0)*innerR0, y0, Math.sin(a0)*innerR0];
      const ix01 = [Math.cos(a1)*innerR0, y0, Math.sin(a1)*innerR0];
      const ix10 = [Math.cos(a0)*innerR1, y1, Math.sin(a0)*innerR1];
      const ix11 = [Math.cos(a1)*innerR1, y1, Math.sin(a1)*innerR1];

      // Outer face
      addTriangle(ox00, ox01, ox10);
      addTriangle(ox01, ox11, ox10);

      // Inner face (flipped normal)
      addTriangle(ix10, ix01, ix00);
      addTriangle(ix10, ix11, ix01);

      // Top cap ring
      addTriangle(ox10, ix10, ix11);
      addTriangle(ox10, ix11, ox11);

      // Bottom cap ring
      addTriangle(ix00, ox00, ox01);
      addTriangle(ix00, ox01, ix01);

      // Side walls (connect inner to outer at each segment edge)
      addTriangle(ox00, ix00, ix10);
      addTriangle(ox00, ix10, ox10);
    }
  }

  // Ribs
  if (params.ribs > 0) {
    for (let r = 0; r < params.ribs; r++) {
      const angle = (r / params.ribs) * Math.PI * 2;
      const ribH = params.height * 0.9;
      const ribW = 2;
      for (let layer = 0; layer < layers - 1; layer++) {
        const y0 = (layer / (layers-1)) * params.height;
        const y1 = ((layer+1) / (layers-1)) * params.height;
        const r0 = getRadius(y0);
        const r1 = getRadius(y1);
        if (y1 > ribH) continue;

        const cosA = Math.cos(angle), sinA = Math.sin(angle);
        const addTriangle = (v1,v2,v3) => {
          vertices.push(...v1,...v2,...v3);
          const ax=v2[0]-v1[0],ay=v2[1]-v1[1],az=v2[2]-v1[2];
          const bx=v3[0]-v1[0],by=v3[1]-v1[1],bz=v3[2]-v1[2];
          let nx=ay*bz-az*by,ny=az*bx-ax*bz,nz=ax*by-ay*bx;
          const l=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
          nx/=l;ny/=l;nz/=l;
          normals.push(nx,ny,nz,nx,ny,nz,nx,ny,nz);
          const i=vertices.length/3-3;
          indices.push(i,i+1,i+2);
        };

        const o0 = [cosA*(r0+ribW), y0, sinA*(r0+ribW)];
        const o1 = [cosA*(r1+ribW), y1, sinA*(r1+ribW)];
        const i0 = [cosA*r0, y0, sinA*r0];
        const i1 = [cosA*r1, y1, sinA*r1];

        addTriangle(i0, o0, o1);
        addTriangle(i0, o1, i1);
      }
    }
  }

  // Base
  const baseType = params.baseType;
  const baseR = params.baseR;
  const baseH = params.baseH;
  const ledR = params.ledHole / 2;

  if (baseType === 'flat') {
    // Flat base cylinder
    const baseSegs = segs;
    for (let s = 0; s < baseSegs; s++) {
      const a0 = (s / baseSegs) * Math.PI * 2;
      const a1 = ((s+1) / baseSegs) * Math.PI * 2;
      const addTriangle = (v1,v2,v3) => {
        vertices.push(...v1,...v2,...v3);
        const ax=v2[0]-v1[0],ay=v2[1]-v1[1],az=v2[2]-v1[2];
        const bx=v3[0]-v1[0],by=v3[1]-v1[1],bz=v3[2]-v1[2];
        let nx=ay*bz-az*by,ny=az*bx-ax*bz,nz=ax*by-ay*bx;
        const l=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
        nx/=l;ny/=l;nz/=l;
        normals.push(nx,ny,nz,nx,ny,nz,nx,ny,nz);
        const i=vertices.length/3-3;
        indices.push(i,i+1,i+2);
      };

      // Top face
      addTriangle([0,0,0],[Math.cos(a0)*baseR,0,Math.sin(a0)*baseR],[Math.cos(a1)*baseR,0,Math.sin(a1)*baseR]);
      // Side
      addTriangle([Math.cos(a0)*baseR,0,Math.sin(a0)*baseR],[Math.cos(a0)*baseR,-baseH,Math.sin(a0)*baseR],[Math.cos(a1)*baseR,-baseH,Math.sin(a1)*baseR]);
      addTriangle([Math.cos(a0)*baseR,0,Math.sin(a0)*baseR],[Math.cos(a1)*baseR,-baseH,Math.sin(a1)*baseR],[Math.cos(a1)*baseR,0,Math.sin(a1)*baseR]);
      // Bottom
      addTriangle([0,-baseH,0],[Math.cos(a1)*baseR,-baseH,Math.sin(a1)*baseR],[Math.cos(a0)*baseR,-baseH,Math.sin(a0)*baseR]);
    }
  } else if (baseType === 'rounded') {
    // Rounded base
    const steps = 6;
    for (let step = 0; step < steps; step++) {
      const t0 = step / steps;
      const t1 = (step+1) / steps;
      const r0 = baseR * (1 - t0 * 0.3);
      const r1 = baseR * (1 - t1 * 0.3);
      const y0 = -baseH * t0;
      const y1 = -baseH * t1;
      
      for (let s = 0; s < segs; s++) {
        const a0 = (s / segs) * Math.PI * 2;
        const a1 = ((s+1) / segs) * Math.PI * 2;
        const addTriangle = (v1,v2,v3) => {
          vertices.push(...v1,...v2,...v3);
          const ax=v2[0]-v1[0],ay=v2[1]-v1[1],az=v2[2]-v1[2];
          const bx=v3[0]-v1[0],by=v3[1]-v1[1],bz=v3[2]-v1[2];
          let nx=ay*bz-az*by,ny=az*bx-ax*bz,nz=ax*by-ay*bx;
          const l=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
          nx/=l;ny/=l;nz/=l;
          normals.push(nx,ny,nz,nx,ny,nz,nx,ny,nz);
          const i=vertices.length/3-3;
          indices.push(i,i+1,i+2);
        };

        addTriangle([Math.cos(a0)*r0,y0,Math.sin(a0)*r0],[Math.cos(a1)*r0,y0,Math.sin(a1)*r0],[Math.cos(a0)*r1,y1,Math.sin(a0)*r1]);
        addTriangle([Math.cos(a1)*r0,y0,Math.sin(a1)*r0],[Math.cos(a1)*r1,y1,Math.sin(a1)*r1],[Math.cos(a0)*r1,y1,Math.sin(a0)*r1]);
      }
    }
    // Bottom cap
    for (let s = 0; s < segs; s++) {
      const a0 = (s / segs) * Math.PI * 2;
      const a1 = ((s+1) / segs) * Math.PI * 2;
      const addTriangle = (v1,v2,v3) => {
        vertices.push(...v1,...v2,...v3);
        normals.push(0,-1,0,0,-1,0,0,-1,0);
        const i=vertices.length/3-3;
        indices.push(i,i+1,i+2);
      };
      const r = baseR * 0.7;
      addTriangle([0,-baseH,0],[Math.cos(a1)*r,-baseH,Math.sin(a1)*r],[Math.cos(a0)*r,-baseH,Math.sin(a0)*r]);
    }
  } else if (baseType === 'flared') {
    // Flared base - wider at bottom
    const bottomR = baseR * 1.4;
    for (let s = 0; s < segs; s++) {
      const a0 = (s / segs) * Math.PI * 2;
      const a1 = ((s+1) / segs) * Math.PI * 2;
      const addTriangle = (v1,v2,v3) => {
        vertices.push(...v1,...v2,...v3);
        const ax=v2[0]-v1[0],ay=v2[1]-v1[1],az=v2[2]-v1[2];
        const bx=v3[0]-v1[0],by=v3[1]-v1[1],bz=v3[2]-v1[2];
        let nx=ay*bz-az*by,ny=az*bx-ax*bz,nz=ax*by-ay*bx;
        const l=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
        nx/=l;ny/=l;nz/=l;
        normals.push(nx,ny,nz,nx,ny,nz,nx,ny,nz);
        const i=vertices.length/3-3;
        indices.push(i,i+1,i+2);
      };

      // Top
      addTriangle([0,0,0],[Math.cos(a0)*baseR,0,Math.sin(a0)*baseR],[Math.cos(a1)*baseR,0,Math.sin(a1)*baseR]);
      // Side
      addTriangle([Math.cos(a0)*baseR,0,Math.sin(a0)*baseR],[Math.cos(a0)*bottomR,-baseH,Math.sin(a0)*bottomR],[Math.cos(a1)*bottomR,-baseH,Math.sin(a1)*bottomR]);
      addTriangle([Math.cos(a0)*baseR,0,Math.sin(a0)*baseR],[Math.cos(a1)*bottomR,-baseH,Math.sin(a1)*bottomR],[Math.cos(a1)*baseR,0,Math.sin(a1)*baseR]);
      // Bottom
      addTriangle([0,-baseH,0],[Math.cos(a1)*bottomR,-baseH,Math.sin(a1)*bottomR],[Math.cos(a0)*bottomR,-baseH,Math.sin(a0)*bottomR]);
    }
  } else if (baseType === 'ring') {
    // Ring base
    const ringInner = baseR * 0.6;
    for (let s = 0; s < segs; s++) {
      const a0 = (s / segs) * Math.PI * 2;
      const a1 = ((s+1) / segs) * Math.PI * 2;
      const addTriangle = (v1,v2,v3) => {
        vertices.push(...v1,...v2,...v3);
        const ax=v2[0]-v1[0],ay=v2[1]-v1[1],az=v2[2]-v1[2];
        const bx=v3[0]-v1[0],by=v3[1]-v1[1],bz=v3[2]-v1[2];
        let nx=ay*bz-az*by,ny=az*bx-ax*bz,nz=ax*by-ay*bx;
        const l=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
        nx/=l;ny/=l;nz/=l;
        normals.push(nx,ny,nz,nx,ny,nz,nx,ny,nz);
        const i=vertices.length/3-3;
        indices.push(i,i+1,i+2);
      };

      // Top ring
      addTriangle([Math.cos(a0)*ringInner,0,Math.sin(a0)*ringInner],[Math.cos(a1)*ringInner,0,Math.sin(a1)*ringInner],[Math.cos(a0)*baseR,0,Math.sin(a0)*baseR]);
      addTriangle([Math.cos(a1)*ringInner,0,Math.sin(a1)*ringInner],[Math.cos(a1)*baseR,0,Math.sin(a1)*baseR],[Math.cos(a0)*baseR,0,Math.sin(a0)*baseR]);
      // Outer side
      addTriangle([Math.cos(a0)*baseR,0,Math.sin(a0)*baseR],[Math.cos(a0)*baseR,-baseH,Math.sin(a0)*baseR],[Math.cos(a1)*baseR,-baseH,Math.sin(a1)*baseR]);
      addTriangle([Math.cos(a0)*baseR,0,Math.sin(a0)*baseR],[Math.cos(a1)*baseR,-baseH,Math.sin(a1)*baseR],[Math.cos(a1)*baseR,0,Math.sin(a1)*baseR]);
      // Inner side
      addTriangle([Math.cos(a0)*ringInner,-baseH,Math.sin(a0)*ringInner],[Math.cos(a0)*ringInner,0,Math.sin(a0)*ringInner],[Math.cos(a1)*ringInner,0,Math.sin(a1)*ringInner]);
      addTriangle([Math.cos(a0)*ringInner,-baseH,Math.sin(a0)*ringInner],[Math.cos(a1)*ringInner,0,Math.sin(a1)*ringInner],[Math.cos(a1)*ringInner,-baseH,Math.sin(a1)*ringInner]);
      // Bottom ring
      addTriangle([Math.cos(a0)*ringInner,-baseH,Math.sin(a0)*ringInner],[Math.cos(a1)*baseR,-baseH,Math.sin(a1)*baseR],[Math.cos(a0)*baseR,-baseH,Math.sin(a0)*baseR]);
      addTriangle([Math.cos(a0)*ringInner,-baseH,Math.sin(a0)*ringInner],[Math.cos(a1)*ringInner,-baseH,Math.sin(a1)*ringInner],[Math.cos(a1)*baseR,-baseH,Math.sin(a1)*baseR]);
    }
  }

  // LED hole
  if (ledR > 0) {
    const ledSegs = 12;
    for (let s = 0; s < ledSegs; s++) {
      const a0 = (s / ledSegs) * Math.PI * 2;
      const a1 = ((s+1) / ledSegs) * Math.PI * 2;
      const addTriangle = (v1,v2,v3) => {
        vertices.push(...v1,...v2,...v3);
        const ax=v2[0]-v1[0],ay=v2[1]-v1[1],az=v2[2]-v1[2];
        const bx=v3[0]-v1[0],by=v3[1]-v1[1],bz=v3[2]-v1[2];
        let nx=ay*bz-az*by,ny=az*bx-ax*bz,nz=ax*by-ay*bx;
        const l=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
        nx/=l;ny/=l;nz/=l;
        normals.push(nx,ny,nz,nx,ny,nz,nx,ny,nz);
        const i=vertices.length/3-3;
        indices.push(i,i+1,i+2);
      };
      // Inner wall of LED hole
      addTriangle([Math.cos(a0)*ledR,-0.1,Math.sin(a0)*ledR],[Math.cos(a0)*ledR,-baseH*0.8,Math.sin(a0)*ledR],[Math.cos(a1)*ledR,-baseH*0.8,Math.sin(a1)*ledR]);
      addTriangle([Math.cos(a0)*ledR,-0.1,Math.sin(a0)*ledR],[Math.cos(a1)*ledR,-baseH*0.8,Math.sin(a1)*ledR],[Math.cos(a1)*ledR,-0.1,Math.sin(a1)*ledR]);
    }
  }

  // Top cap
  if (params.topCap === 1) {
    const capR = params.topCapR;
    const capH = 5;
    for (let s = 0; s < segs; s++) {
      const a0 = (s / segs) * Math.PI * 2;
      const a1 = ((s+1) / segs) * Math.PI * 2;
      const addTriangle = (v1,v2,v3) => {
        vertices.push(...v1,...v2,...v3);
        const ax=v2[0]-v1[0],ay=v2[1]-v1[1],az=v2[2]-v1[2];
        const bx=v3[0]-v1[0],by=v3[1]-v1[1],bz=v3[2]-v1[2];
        let nx=ay*bz-az*by,ny=az*bx-ax*bz,nz=ax*by-ay*bx;
        const l=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
        nx/=l;ny/=l;nz/=l;
        normals.push(nx,ny,nz,nx,ny,nz,nx,ny,nz);
        const i=vertices.length/3-3;
        indices.push(i,i+1,i+2);
      };
      const tr = getRadius(params.height);
      // Cap side
      addTriangle([Math.cos(a0)*tr,params.height,Math.sin(a0)*tr],[Math.cos(a0)*capR,params.height+capH,Math.sin(a0)*capR],[Math.cos(a1)*capR,params.height+capH,Math.sin(a1)*capR]);
      addTriangle([Math.cos(a0)*tr,params.height,Math.sin(a0)*tr],[Math.cos(a1)*capR,params.height+capH,Math.sin(a1)*capR],[Math.cos(a1)*tr,params.height,Math.sin(a1)*tr]);
      // Cap top
      addTriangle([0,params.height+capH,0],[Math.cos(a1)*capR,params.height+capH,Math.sin(a1)*capR],[Math.cos(a0)*capR,params.height+capH,Math.sin(a0)*capR]);
    }
  }

  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  geometry.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  geometry.setIndex(indices);
  geometry.computeBoundingSphere();

  return geometry;
}

// ==================== UPDATE LAMP ====================
function updateLamp() {
  if (lampMesh) {
    scene.remove(lampMesh);
    lampMesh.geometry.dispose();
  }

  const geo = generateLampMesh();
  lampMesh = new THREE.Mesh(geo, lampMaterial);
  lampMesh.castShadow = true;
  lampMesh.receiveShadow = true;
  scene.add(lampMesh);

  // Update info
  const triCount = geo.index ? geo.index.count / 3 : geo.attributes.position.count / 3;
  const vol = (params.bottomR * params.bottomR * Math.PI * params.height / 1000).toFixed(1);
  document.getElementById('info-text').textContent = `Граней: ~${Math.round(triCount)} | Объём: ~${vol} см³`;

  // Update inner glow position
  innerGlow.position.y = params.height * 0.4;
  innerGlow.intensity = 0.5 + Math.sin(Date.now() * 0.002) * 0.2;
}

function updateParam(name, value) {
  value = parseFloat(value) || value;
  params[name] = value;
  
  // Update displays
  const displayMap = {
    'height': 'val-height', 'bottomR': 'val-bottomR', 'topR': 'val-topR',
    'sides': 'val-sides', 'wall': 'val-wall', 'curve': 'val-curve',
    'cellSize': 'val-cell', 'cutDepth': 'val-cutDepth', 'spiralTurns': 'val-spiral',
    'ribs': 'val-ribs', 'baseR': 'val-baseR', 'baseH': 'val-baseH',
    'ledHole': 'val-ledHole', 'topCap': 'val-topCap', 'topCapR': 'val-topCapR'
  };
  if (displayMap[name]) {
    document.getElementById(displayMap[name]).textContent = value;
  }

  updateLamp();
}

// ==================== STL EXPORT ====================
function exportSTL() {
  const geo = generateLampMesh();
  const positions = geo.attributes.position.array;
  const normals = geo.attributes.normal.array;
  const index = geo.index ? geo.index.array : null;
  
  let numTriangles = index ? index.length / 3 : positions.length / 9;
  
  // Binary STL
  const buffer = new ArrayBuffer(84 + numTriangles * 50);
  const view = new DataView(buffer);
  
  // Header (80 bytes)
  const header = 'LampGenerator3D';
  for (let i = 0; i < 80; i++) {
    view.setUint8(i, i < header.length ? header.charCodeAt(i) : 0);
  }
  
  // Number of triangles
  view.setUint32(80, numTriangles, true);
  
  let offset = 84;
  
  for (let i = 0; i < numTriangles; i++) {
    let i0, i1, i2;
    if (index) {
      i0 = index[i*3]; i1 = index[i*3+1]; i2 = index[i*3+2];
    } else {
      i0 = i*3; i1 = i*3+1; i2 = i*3+2;
    }
    
    // Normal
    view.setFloat32(offset, normals[i0*3], true); offset += 4;
    view.setFloat32(offset, normals[i0*3+1], true); offset += 4;
    view.setFloat32(offset, normals[i0*3+2], true); offset += 4;
    
    // Vertex 1
    view.setFloat32(offset, positions[i0*3], true); offset += 4;
    view.setFloat32(offset, positions[i0*3+1], true); offset += 4;
    view.setFloat32(offset, positions[i0*3+2], true); offset += 4;
    
    // Vertex 2
    view.setFloat32(offset, positions[i1*3], true); offset += 4;
    view.setFloat32(offset, positions[i1*3+1], true); offset += 4;
    view.setFloat32(offset, positions[i1*3+2], true); offset += 4;
    
    // Vertex 3
    view.setFloat32(offset, positions[i2*3], true); offset += 4;
    view.setFloat32(offset, positions[i2*3+1], true); offset += 4;
    view.setFloat32(offset, positions[i2*3+2], true); offset += 4;
    
    // Attribute byte count
    view.setUint16(offset, 0, true); offset += 2;
  }
  
  // Download
  const blob = new Blob([buffer], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'lamp_3d_print.stl';
  a.click();
  URL.revokeObjectURL(url);
}

// ==================== ANIMATION LOOP ====================
function animate() {
  requestAnimationFrame(animate);
  updateCamera();
  innerGlow.intensity = 0.5 + Math.sin(Date.now() * 0.003) * 0.3;
  renderer.render(scene, camera);
}

// ==================== INIT ====================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

updateLamp();
animate();
