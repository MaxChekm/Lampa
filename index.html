<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔧 Генератор Ламп 3D Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#08080f;color:#e0e0e0;overflow:hidden}
#canvas3d{position:absolute;top:0;left:0;width:100%;height:100%}
.panel{backdrop-filter:blur(24px);background:rgba(10,10,20,0.88);border:1px solid rgba(255,255,255,0.07)}
.slider-group label{font-size:.7rem;color:#777;text-transform:uppercase;letter-spacing:.05em}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:3px;background:#1a1a2e;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#7c3aed;cursor:pointer;border:2px solid #fff}
select{background:#111122;border:1px solid rgba(255,255,255,0.1);color:#fff;border-radius:6px;padding:6px 10px;font-size:12px;width:100%}
.btn-gen{background:linear-gradient(135deg,#7c3aed,#5b21b6);transition:all .3s}
.btn-gen:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,58,237,.4)}
.btn-dl{background:linear-gradient(135deg,#059669,#047857);transition:all .3s}
.btn-dl:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(5,150,105,.4)}
.btn-sec{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);transition:all .3s}
.btn-sec:hover{background:rgba(255,255,255,0.1)}
.preset-btn{transition:all .3s;cursor:pointer;font-size:11px}
.preset-btn:hover,.preset-btn.active{background:rgba(124,58,237,0.2);border-color:#7c3aed;color:#c4b5fd}
.tab-btn{transition:all .3s}
.tab-btn.active{background:#7c3aed;color:#fff}
.val{font-family:monospace;color:#a78bfa;font-weight:600;font-size:.75rem}
.glow{text-shadow:0 0 20px rgba(124,58,237,.5)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.color-dot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.color-dot.active{border-color:#fff}
</style>
</head>
<body>
<div style="height:100vh;position:relative">
<div id="canvas3d"></div>

<!-- Header -->
<div class="absolute top-0 left-0 right-0 z-10 p-3">
<div class="flex items-center justify-between">
<h1 class="text-xl font-bold glow">💡 Lamp Generator 3D Pro</h1>
<div class="flex gap-2">
<button onclick="randomizeAll()" class="btn-gen px-4 py-2 rounded-lg text-xs font-bold text-white">🎲 Рандом</button>
<button onclick="exportSTL()" class="btn-dl px-5 py-2 rounded-lg text-xs font-bold text-white">⬇ Скачать STL</button>
</div>
</div>
</div>

<!-- Left: Presets -->
<div class="absolute top-14 left-3 z-10 panel rounded-xl p-3 w-48">
<h3 class="text-xs font-semibold mb-2 text-gray-500 uppercase">Стили</h3>
<div class="space-y-1.5">
<button class="preset-btn active w-full px-2 py-1.5 rounded text-left border border-transparent" onclick="applyPreset('classic')">🏛 Классика</button>
<button class="preset-btn w-full px-2 py-1.5 rounded text-left border border-transparent" onclick="applyPreset('modern')">⬜ Модерн</button>
<button class="preset-btn w-full px-2 py-1.5 rounded text-left border border-transparent" onclick="applyPreset('artdeco')">✨ Арт-деко</button>
<button class="preset-btn w-full px-2 py-1.5 rounded text-left border border-transparent" onclick="applyPreset('japanese')">🎋 Японский</button>
<button class="preset-btn w-full px-2 py-1.5 rounded text-left border border-transparent" onclick="applyPreset('industrial')">🔩 Индастриал</button>
<button class="preset-btn w-full px-2 py-1.5 rounded text-left border border-transparent" onclick="applyPreset('organic')">🌿 Органик</button>
<button class="preset-btn w-full px-2 py-1.5 rounded text-left border border-transparent" onclick="applyPreset('futuristic')">🚀 Футуризм</button>
<button class="preset-btn w-full px-2 py-1.5 rounded text-left border border-transparent" onclick="applyPreset('vintage')">🕰 Винтаж</button>
<button class="preset-btn w-full px-2 py-1.5 rounded text-left border border-transparent" onclick="applyPreset('geometric')">🔷 Геометрия</button>
<button class="preset-btn w-full px-2 py-1.5 rounded text-left border border-transparent" onclick="applyPreset('minimal')">⚪ Минимал</button>
</div>

<h3 class="text-xs font-semibold mb-2 mt-4 text-gray-500 uppercase">Цвет материала</h3>
<div class="flex gap-2 flex-wrap" id="colorPicker">
<div class="color-dot active" style="background:#e8e8f0" onclick="setColor('#e8e8f0',this)"></div>
<div class="color-dot" style="background:#1a1a2e" onclick="setColor('#1a1a2e',this)"></div>
<div class="color-dot" style="background:#d4a574" onclick="setColor('#d4a574',this)"></div>
<div class="color-dot" style="background:#8b0000" onclick="setColor('#8b0000',this)"></div>
<div class="color-dot" style="background:#2d5016" onclick="setColor('#2d5016',this)"></div>
<div class="color-dot" style="background:#1e3a5f" onclick="setColor('#1e3a5f',this)"></div>
<div class="color-dot" style="background:#f5f5dc" onclick="setColor('#f5f5dc',this)"></div>
<div class="color-dot" style="background:#c0c0c0" onclick="setColor('#c0c0c0',this)"></div>
</div>
</div>

<!-- Right: Controls -->
<div class="absolute top-14 right-3 z-10 panel rounded-xl p-4 w-72 max-h-[calc(100vh-5rem)] overflow-y-auto">
<div class="flex gap-1 mb-3 bg-black/30 rounded-lg p-1">
<button class="tab-btn active flex-1 py-1.5 rounded-md text-xs font-medium" onclick="switchTab('shade',this)">Плафон</button>
<button class="tab-btn flex-1 py-1.5 rounded-md text-xs font-medium" onclick="switchTab('neck',this)">Ножка</button>
<button class="tab-btn flex-1 py-1.5 rounded-md text-xs font-medium" onclick="switchTab('socket',this)">Патрон</button>
<button class="tab-btn flex-1 py-1.5 rounded-md text-xs font-medium" onclick="switchTab('pattern',this)">Узор</button>
</div>

<!-- Shade Tab -->
<div id="tab-shade" class="tab-content space-y-3">
<div class="slider-group">
<label>Форма плафона</label>
<select id="shadeShape" onchange="up('shadeShape',this.value)">
<option value="cylinder">Цилиндр</option>
<option value="sphere">Сфера</option>
<option value="cone">Конус</option>
<option value="dome">Купол</option>
<option value="barrel">Бочка</option>
<option value="hourglass">Песочные часы</option>
<option value="bell">Колокол</option>
<option value="inverted">Перевёрнутый</option>
<option value="twisted">Скрученный</option>
<option value="hexagonal">Шестиугольник</option>
<option value="teardrop">Капля</option>
<option value="diamond">Ромб</option>
</select>
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Высота</label><span class="val" id="v-sh">100</span></div>
<input type="range" min="30" max="220" value="100" id="shadeH" oninput="up('shadeH',+this.value)">
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Нижний Ø</label><span class="val" id="v-sb">50</span></div>
<input type="range" min="15" max="90" value="50" id="shadeBotR" oninput="up('shadeBotR',+this.value)">
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Верхний Ø</label><span class="val" id="v-st">40</span></div>
<input type="range" min="5" max="90" value="40" id="shadeTopR" oninput="up('shadeTopR',+this.value)">
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Толщина стенки</label><span class="val" id="v-sw">1.5</span></div>
<input type="range" min="0.8" max="5" step="0.1" value="1.5" id="shadeWall" oninput="up('shadeWall',+this.value)">
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Сегменты</label><span class="val" id="v-ss">32</span></div>
<input type="range" min="3" max="64" value="32" id="shadeSegs" oninput="up('shadeSegs',+this.value)">
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Отступ снизу</label><span class="val" id="v-so">5</span></div>
<input type="range" min="0" max="30" value="5" id="shadeOffset" oninput="up('shadeOffset',+this.value)">
</div>
</div>

<!-- Neck Tab -->
<div id="tab-neck" class="tab-content space-y-3 hidden">
<div class="slider-group">
<label>Форма ножки</label>
<select id="neckShape" onchange="up('neckShape',this.value)">
<option value="cylinder">Цилиндр</option>
<option value="tapered">Конусная</option>
<option value="turned">Точёная</option>
<option value="spiral">Спиральная</option>
<option value="crystal">Кристалл</option>
<option value="branch">Ветвь</option>
</select>
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Высота</label><span class="val" id="v-nh">30</span></div>
<input type="range" min="0" max="120" value="30" id="neckH" oninput="up('neckH',+this.value)">
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Нижний Ø</label><span class="val" id="v-nb">40</span></div>
<input type="range" min="10" max="80" value="40" id="neckBotR" oninput="up('neckBotR',+this.value)">
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Верхний Ø</label><span class="val" id="v-nt">25</span></div>
<input type="range" min="5" max="60" value="25" id="neckTopR" oninput="up('neckTopR',+this.value)">
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Детали точения</label><span class="val" id="v-nd">0</span></div>
<input type="range" min="0" max="8" value="0" id="neckDetails" oninput="up('neckDetails',+this.value)">
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Витки спирали</label><span class="val" id="v-ns">3</span></div>
<input type="range" min="1" max="12" value="3" id="neckSpiral" oninput="up('neckSpiral',+this.value)">
</div>
</div>

<!-- Socket Tab -->
<div id="tab-socket" class="tab-content space-y-3 hidden">
<div class="slider-group">
<label>Тип патрона</label>
<select id="socketType" onchange="up('socketType',this.value)">
<option value="e27">E27 (стандарт)</option>
<option value="e14">E14 (миньон)</option>
<option value="gu10">GU10 (направл.)</option>
<option value="e40">E40 (мощный)</option>
<option value="none">Без патрона</option>
</select>
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Выступающая часть</label><span class="val" id="v-sx">15</span></div>
<input type="range" min="0" max="40" value="15" id="socketExt" oninput="up('socketExt',+this.value)">
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Диаметр</label><span class="val" id="v-sd">27</span></div>
<input type="range" min="14" max="45" value="27" id="socketDia" oninput="up('socketDia',+this.value)">
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Глубина посадки</label><span class="val" id="v-sdp">25</span></div>
<input type="range" min="10" max="50" value="25" id="socketDepth" oninput="up('socketDepth',+this.value)">
</div>
<div class="slider-group">
<label class="flex items-center gap-2 cursor-pointer">
<input type="checkbox" id="socketFlange" onchange="up('socketFlange',this.checked)" class="w-4 h-4 accent-[#7c3aed]">
<span class="text-xs text-gray-400">Фланец крепления</span>
</label>
</div>
</div>

<!-- Pattern Tab -->
<div id="tab-pattern" class="tab-content space-y-3 hidden">
<div class="slider-group">
<label>Тип узора</label>
<select id="patternType" onchange="up('patternType',this.value)">
<option value="solid">Сплошной</option>
<option value="spiral">Спираль</option>
<option value="hex">Шестиугольники</option>
<option value="circles">Круги</option>
<option value="diamond">Ромбы</option>
<option value="waves">Волны</option>
<option value="stars">Звёзды</option>
<option value="voronoi">Вороной</option>
<option value="random">🎲 Случайный</option>
<option value="lines">Линии</option>
<option value="cross">Крестики</option>
<option value="lattice">Решётка</option>
</select>
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Размер ячейки</label><span class="val" id="v-pc">8</span></div>
<input type="range" min="3" max="25" value="8" id="patternCell" oninput="up('patternCell',+this.value)">
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Глубина прорези</label><span class="val" id="v-pd">0.8</span></div>
<input type="range" min="0.1" max="2" step="0.1" value="0.8" id="patternDepth" oninput="up('patternDepth',+this.value)">
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Спиральные витки</label><span class="val" id="v-ps">5</span></div>
<input type="range" min="1" max="20" value="5" id="patternSpiral" oninput="up('patternSpiral',+this.value)">
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Рёбра жёсткости</label><span class="val" id="v-pr">0</span></div>
<input type="range" min="0" max="16" value="0" id="patternRibs" oninput="up('patternRibs',+this.value)">
</div>
<div class="slider-group">
<label class="flex items-center gap-2 cursor-pointer">
<input type="checkbox" id="patternInner" onchange="up('patternInner',this.checked)" class="w-4 h-4 accent-[#7c3aed]">
<span class="text-xs text-gray-400">Внутренний рельеф</span>
</label>
</div>
<div class="slider-group">
<div class="flex justify-between mb-1"><label>Seed (для случайных)</label><span class="val" id="v-seed">42</span></div>
<input type="range" min="1" max="999" value="42" id="patternSeed" oninput="up('patternSeed',+this.value)">
</div>
</div>

<div class="mt-4 pt-3 border-t border-white/10">
<div class="text-xs text-gray-500 mb-1">Информация:</div>
<div class="text-xs text-gray-400" id="info-text">Загрузка...</div>
</div>
</div>

<!-- Bottom hint -->
<div class="absolute bottom-3 left-1/2 -translate-x-1/2 z-10 panel rounded-full px-5 py-1.5">
<span class="text-[11px] text-gray-500">🖱 ЛКМ вращение • Колёсико масштаб • ПКМ перемещение</span>
</div>
</div>

<script>
// ==================== THREE.JS ====================
const C=document.getElementById('canvas3d');
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,2000);
camera.position.set(120,140,160);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.3;
C.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x404060,0.5));
const dl=new THREE.DirectionalLight(0xffffff,1.2);dl.position.set(80,200,80);dl.castShadow=true;dl.shadow.mapSize.set(2048,2048);scene.add(dl);
const fl=new THREE.DirectionalLight(0x7c3aed,0.25);fl.position.set(-60,80,-40);scene.add(fl);
const rl=new THREE.DirectionalLight(0xff6c6c,0.15);rl.position.set(0,50,-100);scene.add(rl);
const glow=new THREE.PointLight(0xffaa44,0.6,250);glow.position.set(0,60,0);scene.add(glow);

const gnd=new THREE.Mesh(new THREE.PlaneGeometry(600,600),new THREE.MeshStandardMaterial({color:0x0a0a15,roughness:0.95}));
gnd.rotation.x=-Math.PI/2;gnd.receiveShadow=true;scene.add(gnd);
scene.add(new THREE.GridHelper(300,30,0x1a1a33,0x111122));

// Orbit controls
let drag=false,pan=false,pm={x:0,y:0},oa={t:Math.PI/4,p:Math.PI/3},od=190,ot=new THREE.Vector3(0,55,0);
renderer.domElement.addEventListener('mousedown',e=>{if(e.button===2)pan=true;else drag=true;pm={x:e.clientX,y:e.clientY};e.preventDefault()});
renderer.domElement.addEventListener('mousemove',e=>{const dx=e.clientX-pm.x,dy=e.clientY-pm.y;if(drag){oa.t-=dx*.005;oa.p=Math.max(.1,Math.min(Math.PI-.1,oa.p-dy*.005))}if(pan){const r=new THREE.Vector3(),u=new THREE.Vector3();camera.getWorldDirection(new THREE.Vector3());r.crossVectors(camera.up,new THREE.Vector3().subVectors(camera.position,ot)).normalize();u.copy(camera.up);ot.add(r.multiplyScalar(-dx*.3));ot.add(u.multiplyScalar(dy*.3))}pm={x:e.clientX,y:e.clientY}});
renderer.domElement.addEventListener('mouseup',()=>{drag=false;pan=false});
renderer.domElement.addEventListener('wheel',e=>{od=Math.max(40,Math.min(500,od+e.deltaY*.25));e.preventDefault()},{passive:false});
renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());

function updateCam(){camera.position.x=ot.x+od*Math.sin(oa.p)*Math.cos(oa.t);camera.position.y=ot.y+od*Math.cos(oa.p);camera.position.z=ot.z+od*Math.sin(oa.p)*Math.sin(oa.t);camera.lookAt(ot)}

// ==================== PARAMS ====================
const P={shadeShape:'cylinder',shadeH:100,shadeBotR:50,shadeTopR:40,shadeWall:1.5,shadeSegs:32,shadeOffset:5,neckShape:'cylinder',neckH:30,neckBotR:40,neckTopR:25,neckDetails:0,neckSpiral:3,socketType:'e27',socketExt:15,socketDia:27,socketDepth:25,socketFlange:false,patternType:'solid',patternCell:8,patternDepth:.8,patternSpiral:5,patternRibs:0,patternInner:false,patternSeed:42};
let lampMesh=null;
const mat=new THREE.MeshStandardMaterial({color:0xe8e8f0,roughness:.3,metalness:.1,side:THREE.DoubleSide});

// Seeded random
function seededRandom(seed){let s=seed;return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646}}

// ==================== MESH GEN ====================
function buildMesh(){
  const V=[],N=[],Idx=[];
  let vIdx=0;

  function tri(a,b,c){
    V.push(...a,...b,...c);
    const ax=b[0]-a[0],ay=b[1]-a[1],az=b[2]-a[2],bx=c[0]-a[0],by=c[1]-a[1],bz=c[2]-a[2];
    let nx=ay*bz-az*by,ny=az*bx-ax*bz,nz=ax*by-ay*bx;
    const l=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;nx/=l;ny/=l;nz/=l;
    N.push(nx,ny,nz,nx,ny,nz,nx,ny,nz);
    Idx.push(vIdx,vIdx+1,vIdx+2);vIdx+=3;
  }

  function shadeR(y){
    const t=y/P.shadeH;const segs=P.shadeSegs;
    let r;
    switch(P.shadeShape){
      case'cylinder':r=P.shadeBotR+(P.shadeTopR-P.shadeBotR)*t;break;
      case'sphere':{const s=Math.sin(t*Math.PI);r=P.shadeBotR*s*1.2;break}
      case'cone':r=P.shadeBotR*(1-t)+Math.max(P.shadeTopR,3)*t;break;
      case'dome':r=P.shadeBotR*Math.sqrt(1-(1-t)*(1-t));break;
      case'barrel':r=P.shadeBotR+Math.sin(t*Math.PI)*25;break;
      case'hourglass':r=P.shadeBotR*(1-Math.sin(t*Math.PI)*.6);break;
      case'bell':{const bt=t<.5?1-t*1.2:.3+(t-.5)*.4;r=P.shadeBotR*Math.max(.2,bt);break}
      case'inverted':r=P.shadeTopR+(P.shadeBotR-P.shadeTopR)*(1-t);break;
      case'twisted':{const base=P.shadeBotR+(P.shadeTopR-P.shadeBotR)*t;r=base+Math.sin(t*Math.PI*3+oa.t)*8;break}
      case'hexagonal':{const base=P.shadeBotR+(P.shadeTopR-P.shadeBotR)*t;r=base;break}
      case'teardrop':r=P.shadeBotR*Math.pow(Math.sin(t*Math.PI),.7);break;
      case'diamond':r=P.shadeBotR*Math.sin(t*Math.PI)*1.5;break;
      default:r=P.shadeBotR;
    }
    return Math.max(r,2);
  }

  function patternOff(y,angle){
    const t=y/P.shadeH;const c=P.patternCell;const d=P.patternDepth;
    const rng=seededRandom(P.patternSeed+Math.floor(y*3.7+angle*5.1));
    switch(P.patternType){
      case'solid':return 0;
      case'spiral':{const sv=(angle/(Math.PI*2)+t)*P.patternSpiral;return Math.sin(sv*Math.PI*2)>0?-d:0}
      case'hex':{const ax=Math.round(angle/(Math.PI/3)),ay=Math.round(t*P.shadeH/(c*.866));return(ax+ay)%3===0?-d:0}
      case'circles':{const cx=Math.round(angle*P.shadeBotR/c),cy=Math.round(t*P.shadeH/c);const lx=angle*P.shadeBotR-cx*c,ly=t*P.shadeH-cy*c;return lx*lx+ly*ly<c*c*.2?-d:0}
      case'diamond':{const ax=Math.round(angle/(Math.PI/4)),ay=Math.round(t*P.shadeH/c);return(ax+ay)%2===0?-d:0}
      case'waves':return Math.sin(angle*8+t*P.patternSpiral)>.3?-d:0;
      case'stars':{const ax=Math.round(angle/(Math.PI/5)),ay=Math.round(t*P.shadeH/(c*1.2));return(ax+ay)%3===0?-d*1.5:0}
      case'voronoi':{const s1=Math.sin(angle*3.7+t*7.1)*.5+.5,s2=Math.cos(angle*5.3+t*3.3)*.5+.5;return s1+s2>1.2?-d:0}
      case'random':{const r=rng();return r>.55?-d*1.2:0}

      case'cross':{const ax=Math.round(angle*P.shadeBotR/c),ay=Math.round(t*P.shadeH/c);return((ax+ay)%4===0||ax%4===0)?-d:0}
      case'lattice':{const ax=Math.round(angle/(Math.PI/6)),ay=Math.round(t*P.shadeH/c);return(ax%2===0&&ay%2===0)?-d:0}

    }
  }

  const off=P.shadeOffset;
  const layers=Math.max(4,Math.ceil(P.shadeH/P.patternCell))+1;
  const segs=P.shadeSegs;

  for(let ly=0;ly<layers;ly++){
    const y0=off+(ly/(layers-1))*P.shadeH;
    const y1=off+((ly+1)/(layers-1))*P.shadeH;
    const r0=shadeR(y0-off),r1=shadeR(y1-off);

      const ox10=[Math.cos(a0)*(r1+po10),y1,Math.sin(a0)*(r1+po10)];
      const ox11=[Math.cos(a1)*(r1+po11),y1,Math.sin(a1)*(r1+po11)];
      const ix00=[Math.cos(a0)*ir0,y0,Math.sin(a0)*ir0];
      const ix01=[Math.cos(a1)*ir0,y0,Math.sin(a1)*ir0];
      const ix10=[Math.cos(a0)*ir1,y1,Math.sin(a0)*ir1];
      const ix11=[Math.cos(a1)*ir1,y1,Math.sin(a1)*ir1];

      tri(ix10,ix01,ix00);tri(ix10,ix11,ix01);
      tri(ox10,ix10,ix11);tri(ox10,ix11,ox11);

  }

        const ri0=shadeR(y0-off)-P.shadeWall,ri1=shadeR(y1-off)-P.shadeWall;

  }

  // Neck
  if(P.neckH>0){
    const nSegs=segs;
    const nLayers=12;
    for(let ly=0;ly<nLayers;ly++){
      const t0=ly/nLayers,t1=(ly+1)/nLayers;
      const y0=-P.neckH*t0,y1=-P.neckH*t1;
      let nr0,nr1;

      switch(P.neckShape){
        case'cylinder':nr0=P.neckBotR+(P.neckTopR-P.neckBotR)*t0;nr1=P.neckBotR+(P.neckTopR-P.neckBotR)*t1;break;

  geo.setAttribute('position',new THREE.Float32BufferAttribute(V,3));
  geo.setAttribute('normal',new THREE.Float32BufferAttribute(N,3));
  geo.setIndex(Idx);

}

function generateMesh(){
  const V=[],N=[],Idx=[];
  let vCount=0;
  function addTri(a,b,c){
    V.push(...a,...b,...c);
    const ux=b[0]-a[0],uy=b[1]-a[1],uz=b[2]-a[2],vx=c[0]-a[0],vy=c[1]-a[1],vz=c[2]-a[2];

  }

  function getShadeR(y){
    const t=y/P.shadeH;
    let r;
    switch(P.shadeShape){
      case'cylinder':r=P.shadeBotR+(P.shadeTopR-P.shadeBotR)*t;break;
      case'sphere':r=P.shadeBotR*Math.sin(t*Math.PI)*1.2;break;
      case'cone':r=P.shadeBotR*(1-t)+Math.max(P.shadeTopR,3)*t;break;
      case'dome':r=P.shadeBotR*Math.sqrt(1-(1-t)*(1-t));break;
      case'barrel':r=P.shadeBotR+Math.sin(t*Math.PI)*25;break;
      case'hourglass':r=P.shadeBotR*(1-Math.sin(t*Math.PI)*.6);break;
      case'bell':{const bt=t<.5?1-t*1.2:.3+(t-.5)*.4;r=P.shadeBotR*Math.max(.2,bt);break}
      case'inverted':r=P.shadeTopR+(P.shadeBotR-P.shadeTopR)*(1-t);break;
      case'twisted':{const base=P.shadeBotR+(P.shadeTopR-P.shadeBotR)*t;r=base+Math.sin(t*Math.PI*3)*8;break}

      case'hex':{const ax=Math.round(angle/(Math.PI/3)),ay=Math.round(t*P.shadeH/(c*.866));return(ax+ay)%3===0?-d:0}
      case'circles':{const cx=Math.round(angle*P.shadeBotR/c),cy=Math.round(t*P.shadeH/c);const lx=angle*P.shadeBotR-cx*c,ly=t*P.shadeH-cy*c;return lx*lx+ly*ly<c*c*.2?-d:0}
      case'diamond':{const ax=Math.round(angle/(Math.PI/4)),ay=Math.round(t*P.shadeH/c);return(ax+ay)%2===0?-d:0}
      case'waves':return Math.sin(angle*8+t*P.patternSpiral)>.3?-d:0;
      case'stars':{const ax=Math.round(angle/(Math.PI/5)),ay=Math.round(t*P.shadeH/(c*1.2));return(ax+ay)%3===0?-d*1.5:0}
      case'voronoi':{const s1=Math.sin(angle*3.7+t*7.1)*.5+.5,s2=Math.cos(angle*5.3+t*3.3)*.5+.5;return s1+s2>1.2?-d:0}
      case'random':{const r=rng();return r>.55?-d*1.2:0}

      case'cross':{const ax=Math.round(angle*P.shadeBotR/c),ay=Math.round(t*P.shadeH/c);return((ax+ay)%4===0||ax%4===0)?-d:0}
      case'lattice':{const ax=Math.round(angle/(Math.PI/6)),ay=Math.round(t*P.shadeH/c);return(ax%2===0&&ay%2===0)?-d:0}

    }
  }

      }
      for(let s=0;s<segs;s++){
        const a0=(s/segs)*Math.PI*2,a1=((s+1)/segs)*Math.PI*2;
        let sp0=0,sp1=0;
        if(P.neckShape==='spiral'){sp0=Math.sin(t0*Math.PI*2*P.neckSpiral+a0*P.neckSpiral)*2;sp1=Math.sin(t1*Math.PI*2*P.neckSpiral+a0*P.neckSpiral)*2}

        addTri([Math.cos(a0)*nr0,y0,Math.sin(a0)*nr0],[Math.cos(a0)*onr0,y0,Math.sin(a0)*onr0],[Math.cos(a1)*onr1,y1,Math.sin(a1)*onr1]);
        addTri([Math.cos(a0)*nr0,y0,Math.sin(a0)*nr0],[Math.cos(a1)*onr1,y1,Math.sin(a1)*onr1],[Math.cos(a1)*nr1,y1,Math.sin(a1)*nr1]);

    }
    const nbR=P.neckBotR;
    for(let s=0;s<segs;s++){const a0=(s/segs)*Math.PI*2,a1=((s+1)/segs)*Math.PI*2;addTri([0,-P.neckH,0],[Math.cos(a1)*nbR,-P.neckH,Math.sin(a1)*nbR],[Math.cos(a0)*nbR,-P.neckH,Math.sin(a0)*nbR])}
  }

  // Socket
  if(P.socketType!=='none'){
    const sDia=P.socketDia,sExt=P.socketExt;
    const sSegs=24;
    const sTop=P.neckH>0?-P.neckH:0;
    const sBot=sTop-sExt;
    const threadL=Math.floor(sExt/2);
    for(let tl=0;tl<threadL;tl++){
      const y0=sTop-tl*2,y1=sTop-(tl+1)*2;
      const tr=sDia/2,rid=tr+.8;
      for(let s=0;s<sSegs;s++){
        const a0=(s/sSegs)*Math.PI*2,a1=((s+1)/sSegs)*Math.PI*2;
        addTri([Math.cos(a0)*rid,y0,Math.sin(a0)*rid],[Math.cos(a1)*rid,y0,Math.sin(a1)*rid],[Math.cos(a0)*rid,y1,Math.sin(a0)*rid]);
        addTri([Math.cos(a1)*rid,y0,Math.sin(a1)*rid],[Math.cos(a1)*rid,y1,Math.sin(a1)*rid],[Math.cos(a0)*rid,y1,Math.sin(a0)*rid]);
      }
    }
    for(let s=0;s<sSegs;s++){
      const a0=(s/sSegs)*Math.PI*2,a1=((s+1)/sSegs)*Math.PI*2;
      addTri([Math.cos(a0)*sDia/2,sTop,Math.sin(a0)*sDia/2],[Math.cos(a1)*sDia/2,sTop,Math.sin(a1)*sDia/2],[Math.cos(a0)*sDia/2,sBot,Math.sin(a0)*sDia/2]);
      addTri([Math.cos(a1)*sDia/2,sTop,Math.sin(a1)*sDia/2],[Math.cos(a1)*sDia/2,sBot,Math.sin(a1)*sDia/2],[Math.cos(a0)*sDia/2,sBot,Math.sin(a0)*sDia/2]);
    }
    for(let s=0;s<sSegs;s++){const a0=(s/sSegs)*Math.PI*2,a1=((s+1)/sSegs)*Math.PI*2;addTri([0,sBot,0],[Math.cos(a1)*sDia/2,sBot,Math.sin(a1)*sDia/2],[Math.cos(a0)*sDia/2,sBot,Math.sin(a0)*sDia/2])}
    if(P.socketFlange){
      const fR=sDia/2+8,fH=3;
      for(let s=0;s<sSegs;s++){
        const a0=(s/sSegs)*Math.PI*2,a1=((s+1)/sSegs)*Math.PI*2;
        addTri([Math.cos(a0)*sDia/2,sTop,Math.sin(a0)*sDia/2],[Math.cos(a0)*fR,sTop,Math.sin(a0)*fR],[Math.cos(a1)*fR,sTop,Math.sin(a1)*fR]);
        addTri([Math.cos(a0)*sDia/2,sTop,Math.sin(a0)*sDia/2],[Math.cos(a1)*fR,sTop,Math.sin(a1)*fR],[Math.cos(a1)*sDia/2,sTop,Math.sin(a1)*sDia/2]);
        addTri([Math.cos(a0)*fR,sTop,Math.sin(a0)*fR],[Math.cos(a0)*fR,sTop-fH,Math.sin(a0)*fR],[Math.cos(a1)*fR,sTop-fH,Math.sin(a1)*fR]);
        addTri([Math.cos(a0)*fR,sTop,Math.sin(a0)*fR],[Math.cos(a1)*fR,sTop-fH,Math.sin(a1)*fR],[Math.cos(a1)*fR,sTop,Math.sin(a1)*fR]);
      }
    }
  }

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(V,3));
  geo.setAttribute('normal',new THREE.Float32BufferAttribute(N,3));
  geo.setIndex(Idx);
  geo.computeBoundingSphere();
  return geo;
}

function refreshLamp(){
  if(lampMesh){scene.remove(lampMesh);lampMesh.geometry.dispose()}
  const geo=generateMesh();
  lampMesh=new THREE.Mesh(geo,mat);lampMesh.castShadow=true;lampMesh.receiveShadow=true;scene.add(lampMesh);
  const triC=Idx.length/3;
  const vol=(P.shadeBotR*P.shadeBotR*Math.PI*P.shadeH/1000).toFixed(1);
  document.getElementById('info-text').textContent=`Граней: ~${Math.round(triC)} | Объём: ~${vol} см³`;
  glow.position.y=P.shadeOffset+P.shadeH*.4;
}

function exportSTL(){
  const geo=generateMesh();
  const pos=geo.attributes.position.array;
  const norm=geo.attributes.normal.array;
  const idx=geo.index?geo.index.array:null;
  const nTri=idx?idx.length/3:pos.length/9;
  const buf=new ArrayBuffer(84+nTri*50);
  const v=new DataView(buf);
  const h='LampGenerator3DPro';
  for(let i=0;i<80;i++)v.setUint8(i,i<h.length?h.charCodeAt(i):0);
  v.setUint32(80,nTri,true);
  let off=84;
  for(let i=0;i<nTri;i++){
    const i0=idx?idx[i*3]:i*3,i1=idx?idx[i*3+1]:i*3+1,i2=idx?idx[i*3+2]:i*3+2;
    v.setFloat32(off,norm[i0*3],true);off+=4;v.setFloat32(off,norm[i0*3+1],true);off+=4;v.setFloat32(off,norm[i0*3+2],true);off+=4;
    v.setFloat32(off,pos[i0*3],true);off+=4;v.setFloat32(off,pos[i0*3+1],true);off+=4;v.setFloat32(off,pos[i0*3+2],true);off+=4;
    v.setFloat32(off,pos[i1*3],true);off+=4;v.setFloat32(off,pos[i1*3+1],true);off+=4;v.setFloat32(off,pos[i1*3+2],true);off+=4;
    v.setFloat32(off,pos[i2*3],true);off+=4;v.setFloat32(off,pos[i2*3+1],true);off+=4;v.setFloat32(off,pos[i2*3+2],true);off+=4;
    v.setUint16(off,0,true);off+=2;
  }
  const blob=new Blob([buf],{type:'application/octet-stream'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='lamp_3d_print.stl';a.click();URL.revokeObjectURL(url);
}
